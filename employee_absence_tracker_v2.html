
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.app{padding:1rem 0}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
.tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--font-sans)}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:0.85}
label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
input,select{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
input:focus,select:focus{outline:none;border-color:var(--color-border-primary)}
.emp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.emp-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;flex-shrink:0}
.emp-info{flex:1;min-width:0}
.emp-name{font-weight:500;font-size:14px}
.emp-dept{font-size:12px;color:var(--color-text-secondary)}
.badge{display:inline-block;padding:2px 8px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500}
.badge-callout{background:#FAEEDA;color:#854F0B}
.badge-vacation{background:#E6F1FB;color:#185FA5}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary)}
tr:last-child td{border-bottom:none}
.form-group{margin-bottom:12px}
.flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.section-title{font-size:15px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:1rem}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:380px;max-width:95vw}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.type-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.type-btn{padding:10px 6px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;font-size:12px;font-family:var(--font-sans);text-align:center;color:var(--color-text-secondary)}
.type-btn.selected-callout{background:#FAEEDA;color:#854F0B;border-color:#EF9F27;font-weight:500}
.type-btn.selected-vacation{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;font-weight:500}
.hours-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hours-hint{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
.rpt-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
.rpt-metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.rpt-metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.rpt-metric-value{font-size:18px;font-weight:500}
.rpt-metric-sub{font-size:11px;color:var(--color-text-secondary)}
.hrs-pill{display:inline-block;padding:1px 6px;border-radius:var(--border-radius-md);font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-left:4px}
</style>

<h2 class="sr-only">Employee Absence Tracker with hours — Sick day, call out, and vacation tracking</h2>

<div class="app">
<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</button>
  <button class="tab" onclick="showTab('employees')"><i class="ti ti-users" aria-hidden="true"></i> Employees</button>
  <button class="tab" onclick="showTab('log')"><i class="ti ti-calendar-event" aria-hidden="true"></i> Log absence</button>
  <button class="tab" onclick="showTab('report')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Report</button>
</div>

<!-- DASHBOARD -->
<div id="sec-dashboard" class="section active">
  <div class="grid4" id="stats" style="margin-bottom:1.5rem"></div>
  <div class="card">
    <div class="section-title"><i class="ti ti-calendar-off" aria-hidden="true"></i> Today's absences</div>
    <div id="today-list"></div>
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-clock" aria-hidden="true"></i> Recent entries</div>
    <table>
      <thead><tr><th>Employee</th><th>Date</th><th>Type</th><th>Hours</th><th>Note</th><th></th></tr></thead>
      <tbody id="recent-table"></tbody>
    </table>
  </div>
</div>

<!-- EMPLOYEES -->
<div id="sec-employees" class="section">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div class="section-title" style="margin:0"><i class="ti ti-users" aria-hidden="true"></i> Employee list</div>
    <span style="font-size:12px;color:var(--color-text-secondary)">18 employees · Pharmacy</span>
  </div>
  <div class="card" style="padding:0.5rem 1.25rem">
    <div id="emp-list"></div>
  </div>
</div>

<!-- LOG -->
<div id="sec-log" class="section">
  <div class="card" style="max-width:480px">
    <div class="section-title"><i class="ti ti-calendar-plus" aria-hidden="true"></i> Log absence</div>
    <div class="form-group">
      <label>Employee</label>
      <select id="log-emp"></select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="log-date">
    </div>
    <div class="form-group">
      <label>Type</label>
      <div class="type-btns">
        <button class="type-btn" id="btn-callout" onclick="selectType('callout')"><i class="ti ti-phone-off" aria-hidden="true"></i><br>Call out</button>
        <button class="type-btn" id="btn-vacation" onclick="selectType('vacation')"><i class="ti ti-beach" aria-hidden="true"></i><br>Leave (Vacation)</button>
      </div>
    </div>
    <div class="form-group">
      <label>Hours</label>
      <div class="hours-row">
        <div>
          <input type="number" id="log-hours" min="0" max="24" step="0.5" placeholder="e.g. 8">
          <div class="hours-hint">Full day = 8 hrs &nbsp;·&nbsp; Half day = 4 hrs</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;padding-top:2px">
          <button class="btn" style="font-size:12px;padding:5px 10px" onclick="setHours(8)">Full day (8h)</button>
          <button class="btn" style="font-size:12px;padding:5px 10px" onclick="setHours(4)">Half day (4h)</button>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="log-note" placeholder="e.g. doctor's appointment">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="logAbsence()"><i class="ti ti-check" aria-hidden="true"></i> Save</button>
    <div id="log-msg" style="margin-top:10px"></div>
  </div>
</div>

<!-- REPORT -->
<div id="sec-report" class="section">
  <div class="card">
    <div class="section-title"><i class="ti ti-filter" aria-hidden="true"></i> Filter</div>
    <div class="grid3">
      <div class="form-group"><label>Employee</label><select id="rpt-emp"><option value="">All employees</option></select></div>
      <div class="form-group"><label>From</label><input type="date" id="rpt-from"></div>
      <div class="form-group"><label>To</label><input type="date" id="rpt-to"></div>
    </div>
    <button class="btn btn-primary" onclick="runReport()"><i class="ti ti-search" aria-hidden="true"></i> Generate report</button>
  </div>
  <div id="report-out"></div>
</div>
</div>

<!-- ADD EMP MODAL -->
<div class="modal-bg" id="modal-add-emp">
  <div class="modal">
    <h3><i class="ti ti-user-plus" aria-hidden="true"></i> Add employee</h3>
    <div class="form-group"><label>Full name</label><input type="text" id="new-name" placeholder="Jane Smith"></div>
    <div class="form-group"><label>Employee ID</label><input type="text" id="new-id" placeholder="EMP-001"></div>
    <div class="form-group"><label>Department</label><input type="text" id="new-dept" placeholder="Operations"></div>
    <div class="form-group"><label>Position</label><input type="text" id="new-pos" placeholder="Staff"></div>
    <div class="flex-end">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addEmployee()">Add</button>
    </div>
  </div>
</div>

<script>
const DB = 'https://moncrief-pharmacy-absence-log-default-rtdb.firebaseio.com';

const today = () => new Date().toISOString().slice(0,10);
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const bgColors = ['#E6F1FB','#EAF3DE','#EEEDFE','#FAEEDA','#E1F5EE','#FAECE7','#F1EFE8'];
const fgColors=['#185FA5','#3B6D11','#534AB7','#854F0B','#0F6E56','#993C1D','#5F5E5A'];

let employees=[
  {id:'EMP-001',name:'BROWN ERICA',dept:'Pharmacy',pos:'Pharm Tech',ci:0},
  {id:'EMP-002',name:'COSME VALENTIN PAOLA',dept:'Pharmacy',pos:'Pharm Tech',ci:1},
  {id:'EMP-003',name:'DUDLEY DEANDRE',dept:'Pharmacy',pos:'Pharm Tech',ci:2},
  {id:'EMP-004',name:'DUNN JAMES',dept:'Pharmacy',pos:'Pharm Tech',ci:3},
  {id:'EMP-005',name:'GOODWIN MONAE',dept:'Pharmacy',pos:'Pharm Tech',ci:4},
  {id:'EMP-006',name:'HAMLET ADRIENNE',dept:'Pharmacy',pos:'Pharm Tech',ci:5},
  {id:'EMP-007',name:'HENDERSON SHANA',dept:'Pharmacy',pos:'Pharm Tech',ci:6},
  {id:'EMP-008',name:'HIPPS-SMITH KIMBERLY',dept:'Pharmacy',pos:'Pharm Tech',ci:0},
  {id:'EMP-009',name:'HOWELL-TAYLOR SHARONDA',dept:'Pharmacy',pos:'Pharm Tech',ci:1},
  {id:'EMP-010',name:'JOHNSON JENNIFER',dept:'Pharmacy',pos:'Pharm Tech',ci:2},
  {id:'EMP-011',name:'LANCHESTER QUEEN',dept:'Pharmacy',pos:'Pharm Tech',ci:3},
  {id:'EMP-012',name:'LUCAS APRIL',dept:'Pharmacy',pos:'Pharm Tech',ci:4},
  {id:'EMP-013',name:'MARZAN-CINTRON MAHARI',dept:'Pharmacy',pos:'Pharm Tech',ci:5},
  {id:'EMP-014',name:'MCCRAY NADINE',dept:'Pharmacy',pos:'Pharm Tech',ci:6},
  {id:'EMP-015',name:'SPRINKLE SHAUNA',dept:'Pharmacy',pos:'Pharm Tech',ci:0},
  {id:'EMP-016',name:'RILEY ALICE',dept:'Pharmacy',pos:'Pharm Tech',ci:1},
  {id:'EMP-017',name:'WALKER LATORIA',dept:'Pharmacy',pos:'Pharm Tech',ci:2},
  {id:'EMP-018',name:'WALTER PARIS',dept:'Pharmacy',pos:'Pharm Tech',ci:3},
];
let entries = [];
let selectedType = '';

// ── Firebase REST API ─────────────────────────────────────────
async function fetchEntries() {
  try {
    const res = await fetch(`${DB}/entries.json`);
    const data = await res.json();
    if (data && typeof data === 'object') {
      entries = Object.entries(data).map(([key, val]) => ({...val, _id: key}));
    } else {
      entries = [];
    }
  } catch(e) { console.error('Fetch error:', e); }
}

async function saveEntry(entry) {
  const res = await fetch(`${DB}/entries.json`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(entry)
  });
  if (!res.ok) throw new Error('Save failed');
  const result = await res.json();
  entries.push({...entry, _id: result.name});
}

async function deleteEntry(id) {
  await fetch(`${DB}/entries/${id}.json`, {method: 'DELETE'});
  entries = entries.filter(e => e._id !== id);
}

async function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['dashboard','employees','log','report'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  await fetchEntries();
  if(t==='dashboard')renderDashboard();
  if(t==='employees')renderEmployees();
  if(t==='log')renderLogSelects();
  if(t==='report')renderReportSelect();
}

function typeBadge(type){
  if(type==='callout')return`<span class="badge badge-callout"><i class="ti ti-phone-off" aria-hidden="true"></i> Call out</span>`;
  return`<span class="badge badge-vacation"><i class="ti ti-beach" aria-hidden="true"></i> Leave (Vacation)</span>`;
}

function fmtHrs(h){if(!h&&h!==0)return'—';return h%1===0?h+'h':h.toFixed(1)+'h';}

function renderDashboard(){
  const td=today();
  const todayAbs=entries.filter(e=>e.date===td);
  const monthAbs=entries.filter(e=>e.date&&e.date.slice(0,7)===td.slice(0,7));
  const monthHrs=monthAbs.reduce((a,b)=>a+(b.hours||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="metric"><div class="metric-label">Total employees</div><div class="metric-value">${employees.length}</div></div>
    <div class="metric"><div class="metric-label">Out today</div><div class="metric-value" style="color:#854F0B">${todayAbs.length}</div></div>
    <div class="metric"><div class="metric-label">Call outs this month</div><div class="metric-value">${monthAbs.filter(e=>e.type==='callout').length}<span style="font-size:13px;font-weight:400;color:var(--color-text-secondary)"> days</span></div></div>
    <div class="metric"><div class="metric-label">Total hrs this month</div><div class="metric-value" style="color:#185FA5">${monthHrs%1===0?monthHrs:monthHrs.toFixed(1)}<span style="font-size:13px;font-weight:400"> h</span></div></div>
  `;

  const tl=document.getElementById('today-list');
  if(!todayAbs.length){tl.innerHTML='<p style="color:var(--color-text-secondary);font-size:13px">No absences today</p>';}
  else tl.innerHTML=todayAbs.map(e=>{
    const emp=employees.find(x=>x.id===e.empId);if(!emp)return'';
    return`<div class="emp-row">
      <div class="avatar" style="background:${bgColors[emp.ci%7]};color:${fgColors[emp.ci%7]}">${initials(emp.name)}</div>
      <div class="emp-info"><div class="emp-name">${emp.name}</div><div class="emp-dept">${emp.dept}${e.note?' · '+e.note:''}</div></div>
      <div style="display:flex;align-items:center;gap:6px">${typeBadge(e.type)}<span class="hrs-pill">${fmtHrs(e.hours)}</span></div>
    </div>`;}).join('');

  const recent=[...entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  document.getElementById('recent-table').innerHTML=recent.map(e=>{
    const emp=employees.find(x=>x.id===e.empId);
    return`<tr>
      <td>${emp?emp.name:e.empId}</td>
      <td>${e.date}</td>
      <td>${typeBadge(e.type)}</td>
      <td style="font-weight:500">${fmtHrs(e.hours)}</td>
      <td style="color:var(--color-text-secondary)">${e.note||''}</td>
      <td><button class="btn" style="padding:3px 8px;font-size:12px" onclick="deleteEntry('${e._id}').then(renderDashboard)"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
    </tr>`;}).join('');
}

function renderEmployees(){
  const m=today().slice(0,7);
  document.getElementById('emp-list').innerHTML=employees.map(emp=>{
    const ee=entries.filter(e=>e.empId===emp.id&&e.date&&e.date.slice(0,7)===m);
    const coH=ee.filter(e=>e.type==='callout').reduce((a,b)=>a+(b.hours||0),0);
    const vacH=ee.filter(e=>e.type==='vacation').reduce((a,b)=>a+(b.hours||0),0);
    return`<div class="emp-row">
      <div class="avatar" style="background:${bgColors[emp.ci%7]};color:${fgColors[emp.ci%7]}">${initials(emp.name)}</div>
      <div class="emp-info"><div class="emp-name">${emp.name}</div><div class="emp-dept">${emp.id} · ${emp.dept} · ${emp.pos}</div></div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <span class="badge badge-callout">${fmtHrs(coH)} call out</span>
        <span class="badge badge-vacation">${fmtHrs(vacH)} leave</span>
        <button class="btn" style="padding:4px 8px;font-size:12px" onclick="removeEmp('${emp.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`;}).join('');
}

function renderLogSelects(){
  document.getElementById('log-emp').innerHTML=employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  document.getElementById('log-date').value=today();
  document.getElementById('log-hours').value='';
  document.getElementById('log-note').value='';
  selectedType='';
  ['callout','vacation'].forEach(t=>document.getElementById('btn-'+t).className='type-btn');
}

function selectType(t){
  selectedType=t;
  ['callout','vacation'].forEach(x=>document.getElementById('btn-'+x).className='type-btn'+(x===t?' selected-'+t:''));
}

function setHours(h){document.getElementById('log-hours').value=h;}

async function logAbsence(){
  const empId=document.getElementById('log-emp').value;
  const date=document.getElementById('log-date').value;
  const note=document.getElementById('log-note').value;
  const hoursRaw=document.getElementById('log-hours').value;
  const hours=hoursRaw!==''?parseFloat(hoursRaw):null;
  if(!empId||!date||!selectedType){showMsg('Please select employee, date, and type','error');return;}
  if(hoursRaw===''||isNaN(hours)||hours<0){showMsg('Please enter valid hours','error');return;}
  const emp=employees.find(e=>e.id===empId);
  const saveBtn=document.querySelector('[onclick="logAbsence()"]');
  saveBtn.disabled=true; saveBtn.textContent='Saving...';
  try {
    await saveEntry({empId,date,type:selectedType,hours,note});
    showMsg(`✓ ${selectedType==='callout'?'Call out':'Leave (Vacation)'} logged for ${emp.name} — ${fmtHrs(hours)}`,'success');
    document.getElementById('log-hours').value='';
    document.getElementById('log-note').value='';
    selectedType='';
    ['callout','vacation'].forEach(t=>document.getElementById('btn-'+t).className='type-btn');
  } catch(e) {
    showMsg('Failed to save. Check your connection.','error');
  }
  saveBtn.disabled=false;
  saveBtn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Save';
}

function showMsg(msg,type){
  const el=document.getElementById('log-msg');
  const isErr=type==='error';
  el.innerHTML=`<div class="alert" style="background:${isErr?'#FCEBEB':'#EAF3DE'};color:${isErr?'#A32D2D':'#3B6D11'};border:0.5px solid ${isErr?'#F09595':'#97C459'}">${msg}</div>`;
  setTimeout(()=>{el.innerHTML=''},3000);
}

function closeModal(){document.getElementById('modal-add-emp').classList.remove('open');}

function renderReportSelect(){
  document.getElementById('rpt-emp').innerHTML='<option value="">All employees</option>'+employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  const m=today();
  document.getElementById('rpt-from').value=m.slice(0,8)+'01';
  document.getElementById('rpt-to').value=m;
}

function runReport(){
  const empId=document.getElementById('rpt-emp').value;
  const from=document.getElementById('rpt-from').value;
  const to=document.getElementById('rpt-to').value;
  let filtered=entries.filter(e=>e.date>=from&&e.date<=to);
  if(empId)filtered=filtered.filter(e=>e.empId===empId);
  const empList=empId?employees.filter(e=>e.id===empId):employees;

  document.getElementById('report-out').innerHTML=empList.map(emp=>{
    const ee=filtered.filter(e=>e.empId===emp.id);
    if(!ee.length)return'';
    const coH=ee.filter(e=>e.type==='callout').reduce((a,b)=>a+(b.hours||0),0);
    const vacH=ee.filter(e=>e.type==='vacation').reduce((a,b)=>a+(b.hours||0),0);
    const totalH=coH+vacH;
    const coDays=ee.filter(e=>e.type==='callout').length;
    const vacDays=ee.filter(e=>e.type==='vacation').length;
    const rows=ee.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
      <tr>
        <td>${e.date}</td>
        <td>${typeBadge(e.type)}</td>
        <td style="font-weight:500">${fmtHrs(e.hours)}</td>
        <td style="color:var(--color-text-secondary)">${e.note||''}</td>
        <td><button class="btn" style="padding:3px 8px;font-size:12px" onclick="deleteEntry('${e._id}').then(runReport)"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
      </tr>`).join('');
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <div class="avatar" style="background:${bgColors[emp.ci%7]};color:${fgColors[emp.ci%7]}">${initials(emp.name)}</div>
        <div><div style="font-weight:500">${emp.name}</div><div style="font-size:12px;color:var(--color-text-secondary)">${emp.id} · ${emp.dept}</div></div>
      </div>
      <div class="rpt-summary">
        <div class="rpt-metric" style="border-left:2px solid #EF9F27">
          <div class="rpt-metric-label">Call out</div>
          <div class="rpt-metric-value" style="color:#854F0B">${fmtHrs(coH)}</div>
          <div class="rpt-metric-sub">${coDays} occurrence${coDays!==1?'s':''}</div>
        </div>
        <div class="rpt-metric" style="border-left:2px solid #85B7EB">
          <div class="rpt-metric-label">Leave (Vacation)</div>
          <div class="rpt-metric-value" style="color:#185FA5">${fmtHrs(vacH)}</div>
          <div class="rpt-metric-sub">${vacDays} occurrence${vacDays!==1?'s':''}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:10px">
        <span style="font-size:12px;color:var(--color-text-secondary)">Total absence hours:</span>
        <span style="font-size:16px;font-weight:500">${fmtHrs(totalH)}</span>
      </div>
      <table><thead><tr><th>Date</th><th>Type</th><th>Hours</th><th>Note</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;}).join('')||'<p style="color:var(--color-text-secondary)">No data for this period.</p>';
}

// Init: load from Firebase then render
fetchEntries().then(renderDashboard);

// Auto-refresh every 30 seconds so all devices stay in sync
setInterval(async () => {
  await fetchEntries();
  if(document.getElementById('sec-dashboard').classList.contains('active')) renderDashboard();
  if(document.getElementById('sec-employees').classList.contains('active')) renderEmployees();
}, 30000);
</script>
