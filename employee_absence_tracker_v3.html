<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Employee Absence Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#F5F6FA;color:#1a1a2e}

.header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:16px;font-weight:600;letter-spacing:0.3px}
.header-sub{font-size:12px;opacity:0.6;margin-top:2px}

.tabs{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;padding:0 24px}
.tab{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab.active{color:#1a1a2e;border-bottom-color:#1a1a2e}
.tab:hover:not(.active){color:#374151}

.page{display:none;padding:24px}.page.active{display:block}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:16px 20px;border:1px solid #e5e7eb}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#9ca3af;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:#1a1a2e;line-height:1}
.stat-sub{font-size:11px;color:#9ca3af;margin-top:4px}
.stat-card.accent-red .stat-value{color:#dc2626}
.stat-card.accent-amber .stat-value{color:#d97706}
.stat-card.accent-blue .stat-value{color:#2563eb}

.card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:16px}
.card-header{padding:14px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:#374151}
.card-body{padding:0}

table{width:100%;border-collapse:collapse}
thead th{background:#f9fafb;padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap}
tbody td{padding:10px 16px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafafa}
.num{text-align:center}
.num-val{text-align:center;font-weight:600}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-callout{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.badge-vacation{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}

.absent-row{background:#fffbeb !important}

.form-card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:24px;max-width:500px}
.form-title{font-size:15px;font-weight:600;margin-bottom:20px;color:#1a1a2e}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;color:#1a1a2e;background:#fff;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#1a1a2e}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-btn{padding:12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#6b7280;text-align:center;transition:all 0.15s}
.type-btn:hover{border-color:#9ca3af}
.type-btn.sel-callout{background:#fffbeb;border-color:#f59e0b;color:#92400e;font-weight:600}
.type-btn.sel-vacation{background:#eff6ff;border-color:#3b82f6;color:#1e40af;font-weight:600}
.hours-quick{display:flex;gap:8px;margin-top:6px}
.hours-quick button{padding:5px 12px;border:1px solid #d1d5db;border-radius:5px;background:#f9fafb;cursor:pointer;font-size:12px;font-family:inherit;color:#374151}
.hours-quick button:hover{background:#e5e7eb}
.btn-submit{width:100%;padding:11px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;transition:opacity 0.15s}
.btn-submit:hover{opacity:0.88}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-top:12px}
.alert-success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

.filter-bar{background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:16px 20px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end}
.filter-bar label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:#6b7280;display:block;margin-bottom:4px}
.filter-bar select,.filter-bar input{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit}
.btn-run{padding:9px 20px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}

.btn-del{padding:3px 8px;border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:11px;color:#9ca3af;font-family:inherit}
.btn-del:hover{border-color:#fca5a5;color:#dc2626;background:#fef2f2}
.btn-edit{padding:3px 8px;border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:11px;color:#9ca3af;font-family:inherit;margin-right:4px}
.btn-edit:hover{border-color:#93c5fd;color:#2563eb;background:#eff6ff}

.add-emp-bar{display:flex;gap:8px;padding:16px 20px;border-bottom:1px solid #f3f4f6;align-items:center}
.add-emp-bar input{flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit}
.add-emp-bar input:focus{outline:none;border-color:#1a1a2e}
.btn-add{padding:8px 16px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-add:hover{opacity:0.88}
.btn-add:disabled{opacity:0.5;cursor:not-allowed}

.empty{padding:32px;text-align:center;color:#9ca3af;font-size:13px}
.loading{padding:32px;text-align:center;color:#9ca3af;font-size:13px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-title{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.modal-sub{font-size:12px;color:#9ca3af;margin-bottom:20px}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#374151}
.btn-cancel:hover{background:#f9fafb}
.btn-save{flex:2;padding:10px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-save:hover{opacity:0.88}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}

@media(max-width:640px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .filter-bar{grid-template-columns:1fr 1fr;gap:8px}
  .filter-bar .btn-run{grid-column:1/-1;width:100%}
  .page{padding:10px}
  .header{padding:10px 14px}
  .header-title{font-size:14px}
  .tabs{padding:0 4px;overflow-x:auto}
  .tab{padding:10px 10px;font-size:12px;white-space:nowrap}
  .stat-card{padding:12px 14px}
  .stat-value{font-size:22px}
  .stat-label{font-size:10px}
  thead th,tbody td{padding:8px 8px;font-size:12px}
  .form-card{padding:16px;max-width:100%}
  .card-header{padding:12px 14px}
  .add-emp-bar{flex-direction:column}
  .add-emp-bar input{width:100%}
  .btn-add{width:100%}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal{padding:18px}
  .type-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Pharmacy Employee Absence Log</div>
    <div class="header-sub">Moncrief Pharmacy</div>
  </div>
  <div id="header-date" style="font-size:12px;opacity:0.6"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="showTab('log')">Log Absence</button>
  <button class="tab" onclick="showTab('report')">Report</button>
  <button class="tab" onclick="showTab('employees')">Employees</button>
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="stats-grid" id="stats"></div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Today's Absences</span>
      <span id="today-date" style="font-size:12px;color:#9ca3af"></span>
    </div>
    <div class="card-body"><div id="today-table"></div></div>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title" id="month-label">Monthly Overview</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>#</th><th>Employee Name</th><th class="num">Call Out</th><th class="num">Leave</th><th class="num">Total Days</th><th class="num">Total Hrs</th></tr></thead>
        <tbody id="monthly-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- LOG ABSENCE -->
<div id="page-log" class="page">
  <div class="form-card">
    <div class="form-title">Log Absence</div>
    <div class="form-group">
      <label>Employee</label>
      <select id="log-emp"></select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="log-date">
    </div>
    <div class="form-group">
      <label>Type</label>
      <div class="type-row">
        <button class="type-btn" id="btn-callout" onclick="selType('callout')">Call Out</button>
        <button class="type-btn" id="btn-vacation" onclick="selType('vacation')">Leave (Vacation)</button>
      </div>
    </div>
    <div class="form-group">
      <label>Hours</label>
      <input type="number" id="log-hours" min="0" max="24" step="0.5" placeholder="e.g. 8">
      <div class="hours-quick">
        <button onclick="setH(8)">Full day (8h)</button>
        <button onclick="setH(4)">Half day (4h)</button>
      </div>
    </div>
    <div class="form-group">
      <label>Note <span style="font-weight:400;text-transform:none;color:#9ca3af">(optional)</span></label>
      <input type="text" id="log-note" placeholder="e.g. doctor's appointment">
    </div>
    <button class="btn-submit" onclick="logAbsence()">Save Absence</button>
    <div id="log-msg"></div>
  </div>
</div>

<!-- REPORT -->
<div id="page-report" class="page">
  <div class="filter-bar">
    <div><label>Employee</label><select id="rpt-emp"><option value="">All employees</option></select></div>
    <div><label>From</label><input type="date" id="rpt-from"></div>
    <div><label>To</label><input type="date" id="rpt-to"></div>
    <button class="btn-run" onclick="runReport()">Generate</button>
  </div>
  <div id="report-out"></div>
</div>

<!-- EMPLOYEES -->
<div id="page-employees" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Employee List</span>
      <span id="emp-count" style="font-size:12px;color:#9ca3af"></span>
    </div>
    <div class="add-emp-bar">
      <input type="text" id="new-emp-name" placeholder="Full name (e.g. SMITH JOHN)" maxlength="60">
      <button class="btn-add" id="add-emp-btn" onclick="addEmployee()">+ Add Employee</button>
    </div>
    <div class="card-body">
      <div id="emp-list-table"></div>
    </div>
  </div>
</div>

<!-- EDIT ABSENCE MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-title">Edit Absence</div>
    <div class="modal-sub" id="edit-emp-name"></div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="edit-date">
    </div>
    <div class="form-group">
      <label>Type</label>
      <div class="type-row">
        <button class="type-btn" id="edit-btn-callout" onclick="selEditType('callout')">Call Out</button>
        <button class="type-btn" id="edit-btn-vacation" onclick="selEditType('vacation')">Leave (Vacation)</button>
      </div>
    </div>
    <div class="form-group">
      <label>Hours</label>
      <input type="number" id="edit-hours" min="0" max="24" step="0.5" placeholder="e.g. 8">
      <div class="hours-quick">
        <button onclick="document.getElementById('edit-hours').value=8">Full day (8h)</button>
        <button onclick="document.getElementById('edit-hours').value=4">Half day (4h)</button>
      </div>
    </div>
    <div class="form-group">
      <label>Note <span style="font-weight:400;text-transform:none;color:#9ca3af">(optional)</span></label>
      <input type="text" id="edit-note" placeholder="e.g. doctor's appointment">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const DB = 'https://moncrief-pharmacy-absence-log-default-rtdb.firebaseio.com';

const SEED_EMPLOYEES = [
  'BROWN ERICA','COSME VALENTIN PAOLA','DUDLEY DEANDRE','DUNN JAMES',
  'GOODWIN MONAE','HAMLET ADRIENNE','HENDERSON SHANA','HIPPS-SMITH KIMBERLY',
  'HOWELL-TAYLOR SHARONDA','JOHNSON JENNIFER','LANCHESTER QUEEN','LUCAS APRIL',
  'MARZAN-CINTRON MAHARI','MCCRAY NADINE','SPRINKLE SHAUNA','RILEY ALICE',
  'WALKER LATORIA','WALTER PARIS'
];

let EMPLOYEES = [];
let entries   = [];
let selectedType = '';
let editId = '', editType = '';

const today   = () => new Date().toISOString().slice(0,10);
const fmtDate = d  => new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const fmtHrs  = h  => (!h&&h!==0)?'—':(h%1===0?h+'h':h.toFixed(1)+'h');
const badge   = t  => t==='callout'
  ? '<span class="badge badge-callout">Call Out</span>'
  : '<span class="badge badge-vacation">Leave</span>';

// ── Firebase: Employees ───────────────────────────────────────
async function fetchEmployees() {
  const res  = await fetch(`${DB}/employees.json`);
  const data = await res.json();
  if (data && typeof data === 'object') {
    EMPLOYEES = Object.entries(data).map(([k,v]) => ({...v, _id:k}));
    EMPLOYEES.sort((a,b) => a.name.localeCompare(b.name));
  } else {
    // First time: seed the 18 employees
    EMPLOYEES = [];
    for (let i = 0; i < SEED_EMPLOYEES.length; i++) {
      const res2 = await fetch(`${DB}/employees.json`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name: SEED_EMPLOYEES[i], ci: i % 7})
      });
      const r = await res2.json();
      EMPLOYEES.push({_id: r.name, name: SEED_EMPLOYEES[i], ci: i % 7});
    }
    EMPLOYEES.sort((a,b) => a.name.localeCompare(b.name));
  }
}

async function addEmployee() {
  const input = document.getElementById('new-emp-name');
  const name  = input.value.trim().toUpperCase();
  if (!name) return;
  if (EMPLOYEES.some(e => e.name === name)) {
    alert('Employee already exists.'); return;
  }
  const btn = document.getElementById('add-emp-btn');
  btn.disabled = true; btn.textContent = 'Adding...';
  const ci  = EMPLOYEES.length % 7;
  const res = await fetch(`${DB}/employees.json`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, ci})
  });
  const r = await res.json();
  EMPLOYEES.push({_id: r.name, name, ci});
  EMPLOYEES.sort((a,b) => a.name.localeCompare(b.name));
  input.value = '';
  btn.disabled = false; btn.textContent = '+ Add Employee';
  renderEmployeesPage();
}

async function removeEmployee(id) {
  const emp = EMPLOYEES.find(e => e._id === id);
  if (!confirm(`Remove ${emp?.name}?\n\nTheir absence records will be kept in the log.`)) return;
  await fetch(`${DB}/employees/${id}.json`, {method:'DELETE'});
  EMPLOYEES = EMPLOYEES.filter(e => e._id !== id);
  renderEmployeesPage();
}

// ── Firebase: Entries ─────────────────────────────────────────
async function fetchEntries() {
  const res  = await fetch(`${DB}/entries.json`);
  const data = await res.json();
  entries = data && typeof data==='object'
    ? Object.entries(data).map(([k,v]) => ({...v, _id:k}))
    : [];
}

async function saveEntry(entry) {
  const res = await fetch(`${DB}/entries.json`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)
  });
  if (!res.ok) throw new Error();
  const r = await res.json();
  entries.push({...entry, _id: r.name});
}

async function deleteEntry(id) {
  await fetch(`${DB}/entries/${id}.json`, {method:'DELETE'});
  entries = entries.filter(e => e._id !== id);
}

async function updateEntry(id, data) {
  const res = await fetch(`${DB}/entries/${id}.json`, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  if (!res.ok) throw new Error();
  const idx = entries.findIndex(e => e._id === id);
  if (idx !== -1) entries[idx] = {...entries[idx], ...data};
}

// ── Tabs ──────────────────────────────────────────────────────
async function showTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) =>
    b.classList.toggle('active', ['dashboard','log','report','employees'][i] === t));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  await fetchEntries();
  if (t==='dashboard') renderDashboard();
  if (t==='log')       initLog();
  if (t==='report')    initReport();
  if (t==='employees') renderEmployeesPage();
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard() {
  const td = today(), mo = td.slice(0,7);
  const todayAbs = entries.filter(e => e.date===td);
  const moAbs    = entries.filter(e => e.date&&e.date.slice(0,7)===mo);
  const moHrs    = moAbs.reduce((a,b) => a+(b.hours||0), 0);
  const moCo     = moAbs.filter(e => e.type==='callout').length;
  const moVac    = moAbs.filter(e => e.type==='vacation').length;

  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('month-label').textContent =
    'Monthly Overview — '+new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Staff</div>
      <div class="stat-value">${EMPLOYEES.length}</div>
      <div class="stat-sub">Pharmacy Techs</div>
    </div>
    <div class="stat-card accent-red">
      <div class="stat-label">Out Today</div>
      <div class="stat-value">${todayAbs.length}</div>
      <div class="stat-sub">${EMPLOYEES.length-todayAbs.length} present</div>
    </div>
    <div class="stat-card accent-amber">
      <div class="stat-label">Call Outs This Month</div>
      <div class="stat-value">${moCo}</div>
      <div class="stat-sub">${moVac} leave</div>
    </div>
    <div class="stat-card accent-blue">
      <div class="stat-label">Leaves This Month</div>
      <div class="stat-value">${moVac}</div>
      <div class="stat-sub">${moAbs.length} total entries</div>
    </div>`;

  if (!todayAbs.length) {
    document.getElementById('today-table').innerHTML = '<div class="empty">No absences recorded today</div>';
  } else {
    document.getElementById('today-table').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>Employee</th><th>Type</th><th class="num">Hours</th><th>Note</th><th></th></tr></thead>
        <tbody>${todayAbs.map((e,i) => {
          const emp = EMPLOYEES.find(x => x._id===e.empId);
          return `<tr class="absent-row">
            <td style="color:#9ca3af">${i+1}</td>
            <td style="font-weight:600">${emp?emp.name:e.empId}</td>
            <td>${badge(e.type)}</td>
            <td class="num-val">${fmtHrs(e.hours)}</td>
            <td style="color:#6b7280">${e.note||'—'}</td>
            <td style="white-space:nowrap">
              <button class="btn-edit" onclick="openEdit('${e._id}')">Edit</button>
              <button class="btn-del" onclick="deleteEntry('${e._id}').then(renderDashboard)">✕</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }

  const rows = EMPLOYEES.map((emp,i) => {
    const ee  = moAbs.filter(e => e.empId===emp._id);
    const co  = ee.filter(e => e.type==='callout').length;
    const vac = ee.filter(e => e.type==='vacation').length;
    const hrs = ee.reduce((a,b) => a+(b.hours||0), 0);
    const isOut = todayAbs.some(e => e.empId===emp._id);
    return `<tr${isOut?' class="absent-row"':''}>
      <td style="color:#9ca3af">${i+1}</td>
      <td style="font-weight:${isOut?'600':'400'}">${emp.name}${isOut?' <span class="badge badge-callout" style="font-size:10px;padding:1px 6px">OUT</span>':''}</td>
      <td class="num-val">${co||'—'}</td>
      <td class="num-val">${vac||'—'}</td>
      <td class="num-val">${co+vac||'—'}</td>
      <td class="num-val">${hrs?fmtHrs(hrs):'—'}</td>
    </tr>`;
  }).join('');

  const totCo = moAbs.filter(e=>e.type==='callout').length;
  const totVac= moAbs.filter(e=>e.type==='vacation').length;
  const totHrs= moAbs.reduce((a,b)=>a+(b.hours||0),0);
  document.getElementById('monthly-table').innerHTML = rows + `
    <tr style="background:#f9fafb;font-weight:700;border-top:2px solid #e5e7eb">
      <td></td><td style="font-weight:700">TOTAL</td>
      <td class="num-val">${totCo}</td><td class="num-val">${totVac}</td>
      <td class="num-val">${totCo+totVac}</td><td class="num-val">${fmtHrs(totHrs)}</td>
    </tr>`;
}

// ── Log Absence ───────────────────────────────────────────────
function initLog() {
  document.getElementById('log-emp').innerHTML =
    EMPLOYEES.map(e => `<option value="${e._id}">${e.name}</option>`).join('');
  document.getElementById('log-date').value = today();
  document.getElementById('log-hours').value = '';
  document.getElementById('log-note').value = '';
  document.getElementById('log-msg').innerHTML = '';
  selectedType = '';
  ['callout','vacation'].forEach(t => document.getElementById('btn-'+t).className='type-btn');
}

function selType(t) {
  selectedType = t;
  document.getElementById('btn-callout').className = 'type-btn'+(t==='callout'?' sel-callout':'');
  document.getElementById('btn-vacation').className = 'type-btn'+(t==='vacation'?' sel-vacation':'');
}

function setH(h) { document.getElementById('log-hours').value = h; }

async function logAbsence() {
  const empId = document.getElementById('log-emp').value;
  const date  = document.getElementById('log-date').value;
  const note  = document.getElementById('log-note').value.trim();
  const hRaw  = document.getElementById('log-hours').value;
  const hours = hRaw!=='' ? parseFloat(hRaw) : null;
  const msg   = document.getElementById('log-msg');
  if (!empId||!date||!selectedType) { msg.innerHTML='<div class="alert alert-error">Please select employee, date, and type.</div>'; return; }
  if (hRaw===''||isNaN(hours)||hours<0) { msg.innerHTML='<div class="alert alert-error">Please enter valid hours.</div>'; return; }
  const btn = document.querySelector('.btn-submit');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    const emp = EMPLOYEES.find(e => e._id===empId);
    await saveEntry({empId, date, type:selectedType, hours, note});
    msg.innerHTML=`<div class="alert alert-success">✓ ${selectedType==='callout'?'Call out':'Leave'} logged for <strong>${emp.name}</strong> — ${fmtHrs(hours)}</div>`;
    document.getElementById('log-hours').value='';
    document.getElementById('log-note').value='';
    selectedType='';
    ['callout','vacation'].forEach(t => document.getElementById('btn-'+t).className='type-btn');
  } catch(e) { msg.innerHTML='<div class="alert alert-error">Failed to save. Check your connection.</div>'; }
  btn.disabled=false; btn.textContent='Save Absence';
  setTimeout(() => { msg.innerHTML=''; }, 4000);
}

// ── Edit Modal ────────────────────────────────────────────────
function openEdit(id) {
  const entry = entries.find(e => e._id===id);
  if (!entry) return;
  const emp = EMPLOYEES.find(e => e._id===entry.empId);
  editId = id; editType = entry.type;
  document.getElementById('edit-emp-name').textContent = emp ? emp.name : entry.empId;
  document.getElementById('edit-date').value  = entry.date;
  document.getElementById('edit-hours').value = entry.hours ?? '';
  document.getElementById('edit-note').value  = entry.note || '';
  selEditType(entry.type);
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  editId=''; editType='';
}

function selEditType(t) {
  editType = t;
  document.getElementById('edit-btn-callout').className = 'type-btn'+(t==='callout'?' sel-callout':'');
  document.getElementById('edit-btn-vacation').className = 'type-btn'+(t==='vacation'?' sel-vacation':'');
}

async function saveEdit() {
  const date  = document.getElementById('edit-date').value;
  const hRaw  = document.getElementById('edit-hours').value;
  const hours = hRaw!=='' ? parseFloat(hRaw) : null;
  const note  = document.getElementById('edit-note').value.trim();
  if (!date||!editType||hRaw===''||isNaN(hours)||hours<0) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    await updateEntry(editId, {date, type:editType, hours, note});
    closeEdit();
    if (document.getElementById('page-dashboard').classList.contains('active')) renderDashboard();
    if (document.getElementById('page-report').classList.contains('active')) runReport();
  } catch(e) { alert('Failed to save. Check your connection.'); }
  btn.disabled=false; btn.textContent='Save Changes';
}

// ── Employees Page ────────────────────────────────────────────
function renderEmployeesPage() {
  document.getElementById('emp-count').textContent = `${EMPLOYEES.length} employees`;
  if (!EMPLOYEES.length) {
    document.getElementById('emp-list-table').innerHTML = '<div class="empty">No employees yet. Add one above.</div>';
    return;
  }
  const mo = today().slice(0,7);
  const moAbs = entries.filter(e => e.date&&e.date.slice(0,7)===mo);
  document.getElementById('emp-list-table').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Name</th><th class="num">Call Outs (Month)</th><th class="num">Leave (Month)</th><th class="num">Total Days</th><th></th></tr></thead>
      <tbody>${EMPLOYEES.map((emp,i) => {
        const ee  = moAbs.filter(e => e.empId===emp._id);
        const co  = ee.filter(e => e.type==='callout').length;
        const vac = ee.filter(e => e.type==='vacation').length;
        return `<tr>
          <td style="color:#9ca3af">${i+1}</td>
          <td style="font-weight:500">${emp.name}</td>
          <td class="num-val">${co||'—'}</td>
          <td class="num-val">${vac||'—'}</td>
          <td class="num-val">${co+vac||'—'}</td>
          <td><button class="btn-del" onclick="removeEmployee('${emp._id}')">Remove</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

// ── Report ────────────────────────────────────────────────────
function initReport() {
  document.getElementById('rpt-emp').innerHTML =
    '<option value="">All employees</option>' +
    EMPLOYEES.map(e => `<option value="${e._id}">${e.name}</option>`).join('');
  const m = today();
  document.getElementById('rpt-from').value = m.slice(0,8)+'01';
  document.getElementById('rpt-to').value   = m;
  runReport();
}

function runReport() {
  const empId = document.getElementById('rpt-emp').value;
  const from  = document.getElementById('rpt-from').value;
  const to    = document.getElementById('rpt-to').value;
  let filtered = entries.filter(e => e.date>=from&&e.date<=to);
  if (empId) filtered = filtered.filter(e => e.empId===empId);
  if (!filtered.length) {
    document.getElementById('report-out').innerHTML =
      '<div class="card"><div class="empty">No records found for this period.</div></div>'; return;
  }
  const empList = empId ? EMPLOYEES.filter(e=>e._id===empId) : EMPLOYEES;
  const summaryRows = empList.map((emp,i) => {
    const ee      = filtered.filter(e => e.empId===emp._id);
    if (!ee.length) return '';
    const co      = ee.filter(e=>e.type==='callout').length;
    const vac     = ee.filter(e=>e.type==='vacation').length;
    const coHrs   = ee.filter(e=>e.type==='callout').reduce((a,b)=>a+(b.hours||0),0);
    const vacHrs  = ee.filter(e=>e.type==='vacation').reduce((a,b)=>a+(b.hours||0),0);
    return `<tr>
      <td style="color:#9ca3af">${i+1}</td>
      <td style="font-weight:600">${emp.name}</td>
      <td class="num-val">${co||'—'}</td>
      <td class="num-val">${vac||'—'}</td>
      <td class="num-val">${coHrs?fmtHrs(coHrs):'—'}</td>
      <td class="num-val">${vacHrs?fmtHrs(vacHrs):'—'}</td>
    </tr>`;
  }).join('');
  const totCo    = filtered.filter(e=>e.type==='callout').length;
  const totVac   = filtered.filter(e=>e.type==='vacation').length;
  const totCoHrs = filtered.filter(e=>e.type==='callout').reduce((a,b)=>a+(b.hours||0),0);
  const totVacHrs= filtered.filter(e=>e.type==='vacation').reduce((a,b)=>a+(b.hours||0),0);
  const detailRows = [...filtered].sort((a,b)=>b.date.localeCompare(a.date)).map(e => {
    const emp = EMPLOYEES.find(x=>x._id===e.empId);
    return `<tr>
      <td>${fmtDate(e.date)}</td>
      <td style="font-weight:600">${emp?emp.name:e.empId}</td>
      <td>${badge(e.type)}</td>
      <td class="num-val">${fmtHrs(e.hours)}</td>
      <td style="color:#6b7280">${e.note||'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit" onclick="openEdit('${e._id}')">Edit</button>
        <button class="btn-del" onclick="deleteEntry('${e._id}').then(runReport)">✕</button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('report-out').innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><span class="card-title">Summary — ${fmtDate(from)} to ${fmtDate(to)}</span></div>
      <div class="card-body">
        <table>
          <thead><tr><th>#</th><th>Employee</th><th class="num">Call Out</th><th class="num">Leave</th><th class="num">Total Call Out Hrs</th><th class="num">Total Leave Hrs</th></tr></thead>
          <tbody>${summaryRows}
            <tr style="background:#f9fafb;font-weight:700;border-top:2px solid #e5e7eb">
              <td></td><td>TOTAL</td>
              <td class="num-val">${totCo}</td><td class="num-val">${totVac}</td>
              <td class="num-val">${fmtHrs(totCoHrs)}</td><td class="num-val">${fmtHrs(totVacHrs)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">All Entries</span>
        <span style="font-size:12px;color:#9ca3af">${filtered.length} records</span>
      </div>
      <div class="card-body">
        <table>
          <thead><tr><th>Date</th><th>Employee</th><th>Type</th><th class="num">Hours</th><th>Note</th><th></th></tr></thead>
          <tbody>${detailRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await fetchEmployees();
  await fetchEntries();
  renderDashboard();
  initLog();
}

init();

setInterval(async () => {
  await fetchEntries();
  if (document.getElementById('page-dashboard').classList.contains('active')) renderDashboard();
}, 30000);
</script>
</body>
